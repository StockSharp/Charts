<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>SSChart order-flow performance fixture</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; width: 100%; height: 100%; background: #090d12; overflow: hidden; }
        #chart { width: 960px; height: 660px; }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script src="/dist/sschart.js"></script>
    <script>
        (() => {
            const BAR_COUNT = 25_000;
            const LEVELS_PER_BAR = 12;
            const UPDATE_COUNT = 250;
            const TICK_SIZE = 0.25;

            function makeBars(count) {
                const result = new Array(count);
                const start = Date.UTC(2024, 0, 2) / 1000;
                for (let index = 0; index < count; index++) {
                    const centerTick = 400 + Math.round(Math.sin(index * 0.013) * 36)
                        + Math.round(Math.cos(index * 0.0031) * 12);
                    const lowTick = centerTick - 5;
                    const highTick = lowTick + LEVELS_PER_BAR - 1;
                    const openTick = centerTick;
                    const closeTick = centerTick + ((index % 3) - 1);
                    const levels = new Array(LEVELS_PER_BAR);
                    for (let level = 0; level < LEVELS_PER_BAR; level++) {
                        levels[level] = {
                            price: (lowTick + level) * TICK_SIZE,
                            bidVolume: 1 + ((index * 17 + level * 29) % 180),
                            askVolume: 1 + ((index * 31 + level * 13) % 190),
                            tradeCount: 1 + ((index + level) % 20),
                        };
                    }
                    result[index] = {
                        dataMode: SSChart.OrderFlowDataMode.Exact,
                        time: start + index * 60,
                        open: openTick * TICK_SIZE,
                        high: highTick * TICK_SIZE,
                        low: lowTick * TICK_SIZE,
                        close: closeTick * TICK_SIZE,
                        levels,
                    };
                }
                return result;
            }

            function chartOptions() {
                return {
                    width: 960,
                    height: 660,
                    autoSize: false,
                    layout: {
                        background: { type: 'solid', color: '#131820' },
                        textColor: '#8b97a7',
                        fontFamily: 'Arial, sans-serif',
                        fontSize: 10,
                    },
                    grid: {
                        vertLines: { color: 'rgba(48,61,80,0.45)' },
                        horzLines: { color: 'rgba(48,61,80,0.45)' },
                    },
                    rightPriceScale: { borderColor: '#334155' },
                    timeScale: { borderColor: '#334155', timeVisible: true, ordinal: true },
                };
            }

            function nextFrame() {
                return new Promise((resolve) => requestAnimationFrame(resolve));
            }

            async function waitForPaint() {
                await nextFrame();
                await nextFrame();
            }

            function percentile(values, fraction) {
                const sorted = values.slice().sort((left, right) => left - right);
                return sorted[Math.min(sorted.length - 1, Math.floor(sorted.length * fraction))];
            }

            window.OrderFlowPerformanceFixture = {
                chart: null,
                footprint: null,
                profile: null,
                bars: [],

                async run() {
                    this.destroy();
                    const totalStarted = performance.now();
                    const generationStarted = performance.now();
                    this.bars = makeBars(BAR_COUNT);
                    const generationMs = performance.now() - generationStarted;
                    this.chart = SSChart.createChart(document.getElementById('chart'), chartOptions());
                    this.footprint = this.chart.addSeries(SSChart.FootprintSeries, {
                        tickSize: TICK_SIZE,
                        mode: SSChart.FootprintDisplayMode.BidAsk,
                        detailLevel: SSChart.FootprintDetailLevel.Auto,
                        showUnfinishedAuctions: false,
                    });
                    this.profile = this.chart.addSeries(SSChart.ExactVolumeProfileSeries, {
                        tickSize: TICK_SIZE,
                        rangeMode: SSChart.VolumeProfileRangeMode.Visible,
                        displayMode: SSChart.VolumeProfileDisplayMode.Delta,
                        showLabels: false,
                        showDevelopingLevels: false,
                    });
                    this.footprint.setData(this.bars);
                    this.profile.setData(this.bars);
                    const visibleTo = this.bars[this.bars.length - 1].time;
                    const visibleFrom = this.bars[this.bars.length - 400].time;
                    this.chart.timeScale().setVisibleRange({ from: visibleFrom, to: visibleTo });
                    await waitForPaint();
                    const initializationMs = performance.now() - totalStarted;

                    const frameSamples = [];
                    for (let index = 0; index < 7; index++) {
                        const shift = index * 300;
                        const started = performance.now();
                        this.chart.timeScale().setVisibleRange({
                            from: visibleFrom - shift,
                            to: visibleTo - shift,
                        });
                        await nextFrame();
                        frameSamples.push(performance.now() - started);
                    }

                    const detailStarted = performance.now();
                    this.chart.timeScale().setVisibleRange({
                        from: this.bars[this.bars.length - 10].time,
                        to: visibleTo,
                    });
                    await nextFrame();
                    const detailedFrameMs = performance.now() - detailStarted;

                    const dispatchStarted = performance.now();
                    const original = this.bars[this.bars.length - 1];
                    for (let index = 0; index < UPDATE_COUNT; index++) {
                        const replacement = {
                            ...original,
                            levels: original.levels.map((level, levelIndex) => ({
                                ...level,
                                askVolume: level.askVolume + ((index + levelIndex) % 3),
                            })),
                        };
                        this.footprint.update(replacement);
                        this.profile.update(replacement);
                    }
                    const replaceLastDispatchMs = performance.now() - dispatchStarted;
                    const updateStarted = performance.now();
                    await waitForPaint();
                    const realtimeUpdateMs = performance.now() - updateStarted;

                    return {
                        bars: BAR_COUNT,
                        levelsPerBar: LEVELS_PER_BAR,
                        exactLevelCells: BAR_COUNT * LEVELS_PER_BAR,
                        orderFlowSeries: 2,
                        replaceLastBurst: UPDATE_COUNT,
                        generationMs,
                        initializationMs,
                        frameMedianMs: percentile(frameSamples, 0.5),
                        frameP95Ms: percentile(frameSamples, 0.95),
                        detailedFrameMs,
                        replaceLastDispatchMs,
                        realtimeUpdateMs,
                    };
                },

                destroy() {
                    this.chart?.remove();
                    this.chart = null;
                    this.footprint = null;
                    this.profile = null;
                    this.bars = [];
                    document.getElementById('chart')?.replaceChildren();
                },
            };
        })();
    </script>
</body>
</html>
