name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci
      - name: Test (typecheck + public API + node suite)
        run: npm test
      - name: Build the package and bundles
        run: npm run build
      - name: Verify the publish tarball
        run: npm run pack:check
