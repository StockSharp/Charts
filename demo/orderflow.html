<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Order flow · sschart</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg" />
<link rel="stylesheet" href="./demo.css" />
</head>
<body class="showcase">
<header class="demo-header">
  <a class="brand-link" href="./index.html">&#8249; sschart</a>
  <span class="brand">Order flow <span class="sub">· exact footprint · volume profile · TPO</span></span>
  <span class="spacer"></span>
  <div class="seg" id="modeSeg">
    <button class="tbtn on" data-mode="footprint">Footprint</button>
    <button class="tbtn" data-mode="profile">Volume profile</button>
    <button class="tbtn" data-mode="tpo">TPO</button>
  </div>
  <button id="themeBtn" class="tbtn">&#9788; Light</button>
</header>

<div class="showcase-body">
  <div class="chart-wrap"><div id="chart" class="chart-host"></div></div>
  <aside class="side">
    <div class="side-block">
      <div class="side-title">Exact order flow</div>
      <p class="hint" id="modeDesc"></p>
      <p class="note">These are the <b>exact</b>, tick-accurate studies driven by
      per-price bid/ask volume. The old approximate candle-based Cluster / Box /
      VolumeProfile series were removed — there is now one source of truth for
      volume-at-price.</p>
    </div>
  </aside>
</div>

<script src="../dist/sschart.js"></script>
<script src="./demo-shared.js"></script>
<script src="./demo-orderflow.js"></script>
</body>
</html>
